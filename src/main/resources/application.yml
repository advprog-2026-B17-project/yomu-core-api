server:
  port: ${PORT:8080}

spring:
  application:
    name: yomu-core-api
  datasource:
    url: ${DATABASE_JDBC_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:postgres}?currentSchema=auth,quiz,outbox}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        search: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

rabbitmq:
  exchange: yomu.events

app:
  jwt:
    secret: ${JWT_SECRET:yomu-dev-secret-key-change-in-production-min32chars}
    expiration-ms: 86400000
  outbox:
    poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:5000}

management:
  endpoints:
    web:
      exposure:
        include: health,info