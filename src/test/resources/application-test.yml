spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;SCHEMA=auth
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema: auth

  h2:
    console:
      enabled: false

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql

app:
  jwt:
    secret: "test-secret-key-that-is-long-enough-for-hs256-algorithm-in-tests"
    expiration-ms: 3600000

GATEWAY_SHARED_SECRET: ""
GOOGLE_CLIENT_ID: ""